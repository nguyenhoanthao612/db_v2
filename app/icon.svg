<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    
    <!-- Accent Gradient for the Ring/Globe -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>

    <!-- Metallic/Gold or High-tech Glow -->
    <linearGradient id="glowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
  </defs>

  <!-- Smooth rounded square body (modern app icon shape) -->
  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="8"/>

  <!-- Glowing orbital ring representing Global Standard (GS) -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#accentGrad)" stroke-width="24" stroke-dasharray="12 6" opacity="0.85"/>
  
  <!-- Outer concentric circle, thin -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#60a5fa" stroke-width="4" stroke-dasharray="6 20" opacity="0.6"/>

  <!-- Core Shield / Emblem -->
  <path d="M256,120 L370,165 C370,270 256,365 256,365 C256,365 142,270 142,165 Z" 
        fill="#0f172a" stroke="url(#glowGrad)" stroke-width="16" stroke-linejoin="round" />

  <!-- The stylized "3" or "IC3" lettering inside the shield -->
  <text x="256" y="285" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="140" 
        font-weight="900" 
        fill="#ffffff" 
        text-anchor="middle" 
        letter-spacing="-2"
        style="text-shadow: 0 4px 12px rgba(56, 189, 248, 0.5)">
    3
  </text>
  
  <!-- "GS6" Badge text at the bottom -->
  <rect x="186" y="360" width="140" height="48" rx="24" fill="url(#accentGrad)" />
  <text x="256" y="392" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="24" 
        font-weight="800" 
        fill="#ffffff" 
        text-anchor="middle"
        letter-spacing="1">
    GS6
  </text>
</svg>
